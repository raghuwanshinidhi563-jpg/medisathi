services:
  - type: web
    name: medisathi
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn medisathi.wsgi:application
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false