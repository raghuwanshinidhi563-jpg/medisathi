<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediSathi — AI Medical Report Interpreter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0faf6;color:#1a1a1a}
nav{background:#0F6E56;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{color:#fff;font-size:20px;font-weight:700}
.nav-links a{color:#9FE1CB;text-decoration:none;margin-left:24px;font-size:14px}
.nav-links a:hover{color:#fff}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
.btn{background:#1D9E75;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{background:#0F6E56}
.btn-outline{background:transparent;color:#1D9E75;border:2px solid #1D9E75;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.card{background:#fff;border-radius:14px;padding:28px;border:1px solid #e0e0e0;margin-bottom:20px}
.error{background:#FEE2E2;color:#991B1B;padding:12px 16px;border-radius:8px;margin-bottom:16px;border-left:4px solid #EF4444}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">🏥 MediSathi</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/upload/">Upload Report</a>
    <a href="/history/">History</a>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
